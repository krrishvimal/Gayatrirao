<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- French Ultramarine Graphic Gradient -->
    <linearGradient id="denim-ultra" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001861"/>
      <stop offset="50%" stop-color="#002FA7"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Raw Canvas / Cream Denim Fabric Gradient -->
    <linearGradient id="denim-fabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/> 
      <stop offset="50%" stop-color="#faf9f6"/> <!-- Soft linen cream -->
      <stop offset="100%" stop-color="#eae7e0"/> <!-- Sand shade -->
    </linearGradient>

    <!-- Shadow for Depth -->
    <filter id="ultra-shimmer" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#002FA7" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- BACKGROUND DECORATIONS (Stars & Orbits) -->
  <g opacity="0.1">
    <circle cx="400" cy="300" r="280" fill="none" stroke="url(#denim-ultra)" stroke-width="0.75" stroke-dasharray="10 5"/>
    <circle cx="400" cy="300" r="220" fill="none" stroke="url(#denim-ultra)" stroke-width="0.5"/>
    
    <!-- Stars -->
    <polygon points="120,120 122,126 128,128 122,130 120,136 118,130 112,128 118,126" fill="#002FA7"/>
    <polygon points="680,140 682,146 688,148 682,150 680,156 678,150 672,148 678,146" fill="#002FA7"/>
  </g>

  <!-- JACKET OUTLINE / ART SYSTEM -->
  <g transform="translate(100, 40)" filter="url(#ultra-shimmer)">
    
    <!-- DENIM JACKET BACK SILHOUETTE -->
    <!-- Main Body Base -->
    <path d="M 120,60 L 140,50 L 460,50 L 480,60 L 530,120 L 510,220 L 460,450 L 430,480 L 170,480 L 140,450 L 90,220 L 70,120 Z" fill="url(#denim-fabric)" stroke="#18181b" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Sleeves Outlines -->
    <path d="M 70,120 L 20,240 L 40,280 L 90,220 Z" fill="#faf9f6" stroke="#18181b" stroke-width="1.2"/>
    <path d="M 530,120 L 580,240 L 560,280 L 510,220 Z" fill="#faf9f6" stroke="#18181b" stroke-width="1.2"/>

    <!-- Collar -->
    <path d="M 170,50 Q 300,75 430,50 L 460,20 Q 300,45 140,20 Z" fill="#eae7e0" stroke="#18181b" stroke-width="1.5"/>
    <path d="M 170,50 Q 300,75 430,50" fill="none" stroke="#002FA7" stroke-width="0.8" stroke-dasharray="3 3"/>

    <!-- Back Yoke Panel -->
    <path d="M 120,60 Q 300,90 480,60 L 495,140 Q 300,165 105,140 Z" fill="#faf9f6" stroke="#18181b" stroke-width="1.5"/>
    <!-- Stitching -->
    <path d="M 124,65 Q 300,95 476,65" fill="none" stroke="#002FA7" stroke-width="0.8" stroke-dasharray="3 3"/>
    <path d="M 108,135 Q 300,160 492,135" fill="none" stroke="#002FA7" stroke-width="1" stroke-dasharray="4 2"/>

    <!-- Seams -->
    <path d="M 230,154 L 200,450" stroke="#18181b" stroke-width="1"/>
    <path d="M 370,154 L 400,450" stroke="#18181b" stroke-width="1"/>
    <path d="M 300,156 L 300,450" stroke="#002FA7" stroke-dasharray="4 4" stroke-width="1"/>

    <!-- Waistband / Bottom Hem -->
    <path d="M 140,450 Q 300,465 460,450 L 450,480 Q 300,495 150,480 Z" fill="#eae7e0" stroke="#18181b" stroke-width="1.5"/>
    <path d="M 143,455 Q 300,470 457,455" fill="none" stroke="#002FA7" stroke-width="0.8" stroke-dasharray="3 3"/>
    
    <!-- Waist Adjuster Tabs -->
    <circle cx="165" cy="467" r="3" fill="#002FA7"/>
    <circle cx="435" cy="467" r="3" fill="#002FA7"/>

    <!-- ARTWORK PANEL: THE CELESTIAL ALCHEMY (French Ultramarine Moon Phases) -->
    <g transform="translate(300, 280)">
      
      <!-- Central Alignment Rings -->
      <circle cx="0" cy="-20" r="45" fill="none" stroke="#002FA7" stroke-width="0.8" opacity="0.8"/>
      <circle cx="0" cy="-20" r="35" fill="none" stroke="#002FA7" stroke-width="0.5" stroke-dasharray="5 3"/>
      
      <!-- Sun Rays -->
      <g stroke="#002FA7" stroke-width="0.75" opacity="0.6">
        <line x1="0" y1="-75" x2="0" y2="-65"/>
        <line x1="0" y1="35" x2="0" y2="25"/>
        <line x1="-55" y1="-20" x2="-45" y2="-20"/>
        <line x1="55" y1="-20" x2="45" y2="-20"/>
      </g>

      <!-- Center Divine Eye -->
      <path d="M -20,-20 Q 0,-35 20,-20 Q 0,-5 -20,-20 Z" fill="none" stroke="#002FA7" stroke-width="1.2"/>
      <circle cx="0" cy="-20" r="6" fill="#002FA7"/>
      <circle cx="0" cy="-20" r="2" fill="#ffffff"/>

      <!-- HORIZONTAL MOON PHASES TRANSITION -->
      <!-- Center Full Moon -->
      <circle cx="0" cy="50" r="16" fill="#002FA7"/>
      
      <!-- Gibbous Moons -->
      <!-- Waxing Gibbous (Left) -->
      <path d="M -45,50 A 13 13 0 1 0 -25,50 A 13 8 0 0 1 -45,50" fill="#002FA7"/>
      <!-- Waning Gibbous (Right) -->
      <path d="M 25,50 A 13 13 0 1 1 45,50 A 13 8 0 0 1 25,50" fill="#002FA7"/>

      <!-- Quarter Moons -->
      <!-- First Quarter (Left) -->
      <path d="M -80,50 A 13 13 0 0 0 -60,50 Z" fill="#002FA7" transform="rotate(180, -70, 50)"/>
      <!-- Third Quarter (Right) -->
      <path d="M 60,50 A 13 13 0 0 0 80,50 Z" fill="#002FA7"/>

      <!-- Crescent Moons -->
      <!-- Waxing Crescent (Far Left) -->
      <path d="M -115,50 A 13 13 0 0 1 -105,37 A 13 9 0 0 0 -115,50 Z" fill="#002FA7" transform="rotate(10, -110, 50)"/>
      <!-- Waning Crescent (Far Right) -->
      <path d="M 105,50 A 13 13 0 0 0 115,63 A 13 9 0 0 1 105,50 Z" fill="#002FA7" transform="rotate(-10, 110, 50)"/>

      <!-- Connecting Orbit Arc -->
      <path d="M -130,50 L 130,50" fill="none" stroke="#002FA7" stroke-width="0.75" stroke-dasharray="4 4"/>
      
      <!-- Mystical Stars & Flakes around artwork -->
      <g fill="#002FA7">
        <polygon points="-70,0 -68,3 -65,4 -68,5 -70,8 -72,5 -75,4 -72,3"/>
        <polygon points="70,0 72,3 75,4 72,5 70,8 68,5 65,4 68,3"/>
        <circle cx="-100" cy="-30" r="1.5"/>
        <circle cx="100" cy="-30" r="1.5"/>
      </g>
    </g>

    <!-- Raw Canvas weathering lines -->
    <path d="M 130,180 Q 150,175 140,190" stroke="#002FA7" opacity="0.3" stroke-width="1" fill="none"/>
    <path d="M 440,220 Q 420,230 435,240" stroke="#002FA7" opacity="0.3" stroke-width="1" fill="none"/>
    
  </g>

  <!-- LUXURY EDITORIAL WATERMARK -->
  <text x="750" y="560" text-anchor="end" font-family="'Bodoni Moda', serif" font-size="10" font-weight="bold" fill="#002FA7" letter-spacing="4" opacity="0.8">GAYATRI RAO // LUNA PHASES CANVAS JACKET</text>
</svg>
