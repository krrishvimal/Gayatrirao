<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- French Ultramarine Paint Gradient -->
    <linearGradient id="ultra-paint" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001861"/>
      <stop offset="40%" stop-color="#002FA7"/>
      <stop offset="80%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Prismatic Iridescent Lavender-Pink Gradient -->
    <linearGradient id="prismatic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/> <!-- Light pink -->
      <stop offset="50%" stop-color="#c084fc"/> <!-- Lavender -->
      <stop offset="100%" stop-color="#002FA7"/> <!-- French Ultramarine -->
    </linearGradient>

    <!-- Leather Panel Base (Warm Alabaster) -->
    <linearGradient id="leather-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f4ef"/>
    </linearGradient>

    <!-- Glowing Ultramarine Shadow -->
    <filter id="ultra-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#002FA7" flood-opacity="0.25"/>
    </filter>

    <!-- Neon Prismatic Glow -->
    <filter id="prismatic-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND DECORATIONS (French Ultramarine & Pink Glows) -->
  <g opacity="0.2" filter="url(#prismatic-glow)">
    <circle cx="280" cy="200" r="140" fill="#002FA7" opacity="0.3"/>
    <circle cx="420" cy="240" r="120" fill="#c084fc" opacity="0.25"/>
    <circle cx="340" cy="300" r="90" fill="#f472b6" opacity="0.15"/>
  </g>

  <!-- CELESTIAL ALIGNMENT LINES -->
  <g opacity="0.25">
    <circle cx="400" cy="250" r="220" fill="none" stroke="url(#ultra-paint)" stroke-width="0.75" stroke-dasharray="8 4"/>
    <circle cx="400" cy="250" r="170" fill="none" stroke="url(#ultra-paint)" stroke-width="0.5"/>
    
    <!-- Stars & Sparkles -->
    <!-- Star 1 -->
    <polygon points="260,80 263,90 273,93 263,96 260,106 257,96 247,93 257,90" fill="url(#ultra-paint)" filter="url(#ultra-glow)"/>
    <!-- Star 2 -->
    <polygon points="500,100 502,107 509,109 502,111 500,118 498,111 491,109 498,107" fill="#c084fc" opacity="0.8"/>
    <!-- Tiny Stars -->
    <circle cx="330" cy="90" r="1.5" fill="#002FA7"/>
    <circle cx="210" cy="140" r="1.5" fill="#c084fc"/>
    <circle cx="480" cy="70" r="2" fill="#002FA7"/>
  </g>

  <!-- MAIN SNEAKER GROUP -->
  <g transform="translate(100, 50)">
    
    <!-- SOLE / OUTSOLE -->
    <!-- Midsole Base - Warm Sand/Linen -->
    <path d="M 70,350 L 80,360 L 510,350 L 510,320 Q 510,310 490,305 L 430,302 L 350,303 L 260,308 L 170,318 L 100,332 Z" fill="#faf9f6" stroke="#18181b" stroke-width="1.2" stroke-linejoin="round"/>
    
    <!-- Outsole Bottom Tread -->
    <path d="M 70,350 Q 80,362 100,363 L 490,354 Q 510,352 510,350 L 505,348 L 75,348 Z" fill="#e4e2dd" stroke="#18181b" stroke-width="0.8"/>
    
    <!-- Midsole Ultramarine Stitching Line -->
    <path d="M 85,345 L 498,338" fill="none" stroke="#002FA7" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.8"/>
    
    <!-- "AIR" Ultramarine Inlay -->
    <text x="410" y="342" font-family="'Inter', sans-serif" font-size="16" font-weight="900" fill="#002FA7" letter-spacing="2" filter="url(#ultra-glow)">AIR</text>
    <line x1="390" y1="330" x2="390" y2="346" stroke="#002FA7" stroke-width="1.2"/>

    <!-- TOE CAP / VAMP - Warm Alabaster base with French Ultramarine splatters -->
    <path d="M 72,330 Q 60,300 85,275 Q 110,250 160,252 L 180,270 L 160,300 L 100,328 Z" fill="url(#leather-base)" stroke="#18181b" stroke-width="1.2"/>
    <!-- Perforations -->
    <g fill="#002FA7">
      <circle cx="110" cy="285" r="2.5"/>
      <circle cx="120" cy="282" r="2.5"/>
      <circle cx="130" cy="280" r="2.5"/>
      <circle cx="115" cy="295" r="2.5"/>
      <circle cx="125" cy="292" r="2.5"/>
      <circle cx="135" cy="290" r="2.5"/>
      <circle cx="145" cy="288" r="2.5"/>
      <circle cx="120" cy="305" r="2.5"/>
      <circle cx="130" cy="302" r="2.5"/>
      <circle cx="140" cy="300" r="2.5"/>
    </g>

    <!-- MUDGUARD OVERLAY - Pure French Ultramarine Blue paint block -->
    <path d="M 72,330 Q 60,290 90,265 L 115,260 Q 120,290 145,315 L 100,332 Z" fill="#002FA7" stroke="#18181b" stroke-width="1.2" filter="url(#ultra-glow)"/>

    <!-- QUARTER PANEL - Luminous Prismatic Iridescent -->
    <path d="M 160,252 Q 220,255 260,220 L 320,225 L 340,303 L 260,308 L 160,300 Z" fill="url(#prismatic)" stroke="#18181b" stroke-width="1.2"/>

    <!-- HEEL COUNTER / HEEL CAP -->
    <path d="M 340,303 L 320,225 L 380,200 Q 420,180 440,180 Q 480,180 490,240 Q 500,290 490,305 L 340,303 Z" fill="url(#leather-base)" stroke="#18181b" stroke-width="1.2"/>
    <!-- Glowing Ultramarine Heel Tab -->
    <path d="M 440,180 Q 460,140 480,150 Q 495,165 488,195 Z" fill="#002FA7" stroke="#18181b" stroke-width="1.2" filter="url(#ultra-glow)"/>

    <!-- EYESTAY & LACES -->
    <path d="M 160,252 L 205,215 L 290,175 Q 310,170 315,185 L 260,220 Q 220,255 160,252 Z" fill="#f2f1ec" stroke="#18181b" stroke-width="1.2"/>
    
    <!-- Laces - Ultramarine Threads -->
    <path d="M 185,235 L 215,225 M 205,218 L 235,208 M 225,202 L 255,192 M 245,190 L 275,180 M 265,182 L 295,172" stroke="#002FA7" stroke-width="4.5" stroke-linecap="round" fill="none" filter="url(#ultra-glow)"/>
    <path d="M 185,235 L 215,225 M 205,218 L 235,208 M 225,202 L 255,192 M 245,190 L 275,180 M 265,182 L 295,172" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- TONGUE -->
    <path d="M 205,215 Q 240,140 280,125 Q 305,115 315,140 L 290,175 Z" fill="url(#leather-base)" stroke="#18181b" stroke-width="1.2"/>
    <path d="M 270,122 Q 285,110 300,120" stroke="#002FA7" stroke-width="3" fill="none" filter="url(#ultra-glow)"/>

    <!-- DYNAMIC MODERN BLUE BRUSHSTROKES & SPLATTERS -->
    <!-- Splash 1 (Front/Toe) -->
    <path d="M 65,295 Q 50,305 45,290 Q 40,270 55,275 Q 65,280 65,295 Z M 48,275 Q 45,270 48,268 Q 51,270 48,275 Z" fill="#002FA7"/>
    <!-- Artistic Ink Drip -->
    <path d="M 150,285 Q 165,295 180,280 Q 200,260 170,265 Q 140,270 150,285 Z" fill="#c084fc" opacity="0.6"/>
    <!-- Blue Splatters scattered on shoe -->
    <circle cx="220" cy="240" r="3" fill="#002FA7"/>
    <circle cx="240" cy="255" r="2" fill="#002FA7"/>
    <circle cx="330" cy="220" r="1.5" fill="#002FA7"/>
    <circle cx="360" cy="260" r="3" fill="#c084fc"/>
    <circle cx="380" cy="240" r="2.5" fill="#002FA7"/>
    
    <!-- THE SWOOSH - Bold Yves Klein Ultramarine paint flow -->
    <path d="M 190,265 Q 230,285 300,245 Q 360,210 440,178 Q 442,185 435,195 Q 380,240 310,280 Q 250,300 190,265 Z" fill="url(#ultra-paint)" stroke="#18181b" stroke-width="1.2" stroke-linejoin="round" filter="url(#ultra-glow)"/>

    <!-- ARTISTIC ELEMENT: MINIMALIST BOTANICALS/FLORAL SKETCH ON SIDE -->
    <!-- Elegant line-art leaves overlapping Swoosh -->
    <path d="M 230,260 Q 250,240 270,250" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 270,250 Q 285,235 295,245" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 205,275 Q 190,265 185,255" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <circle cx="270" cy="250" r="2" fill="#ffffff"/>

    <!-- BLUE DRIP FROM THE SOLE -->
    <path d="M 430,345 C 430,365 435,370 435,375 C 433,375 431,365 428,346 Z" fill="#002FA7" filter="url(#ultra-glow)"/>
    <circle cx="435" cy="380" r="2.5" fill="#002FA7" filter="url(#ultra-glow)"/>

  </g>

  <!-- LUXURY EDITORIAL WATERMARK -->
  <text x="750" y="470" text-anchor="end" font-family="'Bodoni Moda', serif" font-size="10" font-weight="bold" fill="#002FA7" letter-spacing="4" filter="url(#ultra-glow)">GAYATRI RAO // ULTRAMARINE SPLATTER AF1</text>
</svg>
